<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiches - Eukhlou Zikroulah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importation de Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #F5F5F5 0%, #F0FFFE 100%); font-family: sans-serif; }
        .clean-card { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="p-4">
    <main class="max-w-xl mx-auto">
        <form id="upload-form" class="clean-card rounded-2xl p-8 space-y-4">
            <input type="text" id="dahira" required placeholder="Nom de la Dahira" class="w-full p-3 border rounded-xl">
            <input type="date" id="date" required class="w-full p-3 border rounded-xl">
            <input type="time" id="time" required class="w-full p-3 border rounded-xl">
            <input type="text" id="location" required placeholder="Lieu" class="w-full p-3 border rounded-xl">
            <input type="file" id="poster" accept="image/*" required class="w-full p-3 border rounded-xl">
            <button type="submit" id="submit-btn" class="w-full py-3 bg-black text-white rounded-xl">Soumettre</button>
        </form>
        <div id="status-message" class="hidden mt-4 p-4 rounded-xl text-center"></div>
    </main>

    <script>
        const supabase = supabase.createClient(
            'https://fjyofnjskrzsscvnrjlh.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqeW9mbmpza3J6c3Njdm5yamxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODk4NjQsImV4cCI6MjA5OTg2NTg2NH0.H8tDYlDPaPNxBGKCrwy6e6fBl15p6HoGika--p7mNRo'
        );

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-message');
            btn.disabled = true;

            const file = document.getElementById('poster').files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Math.random()}.${fileExt}`;

            // 1. Upload de l'image dans le Storage Supabase
            const { data: uploadData, error: uploadError } = await supabase.storage
                .from('posters') // Assure-toi d'avoir créé ce bucket dans Supabase
                .upload(fileName, file);

            if (uploadError) return alert("Erreur upload: " + uploadError.message);

            // 2. Insertion dans la table
            const { error } = await supabase.from('zikrs').insert({
                dahira_name: document.getElementById('dahira').value,
                zikr_date: document.getElementById('date').value,
                zikr_time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                poster_url: fileName
            });

            if (error) {
                msg.textContent = "Erreur: " + error.message;
                msg.className = "mt-4 p-4 bg-red-100 text-red-700 rounded-xl";
            } else {
                msg.textContent = "Succès !";
                msg.className = "mt-4 p-4 bg-green-100 text-green-700 rounded-xl";
            }
            msg.classList.remove('hidden');
            btn.disabled = false;
        };
    </script>
</body>
</html>
