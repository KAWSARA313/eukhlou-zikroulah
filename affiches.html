<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiches des Événements - Eukhlou Zikroulah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #F5F5F5 0%, #F0FFFE 100%); font-family: sans-serif; }
        .clean-card { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
        .clean-input { border: 1px solid rgba(0, 0, 0, 0.12); }
    </style>
</head>
<body class="text-[#1A1A1A] min-h-screen pb-12">
    <header class="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center border-b border-black/5 mb-10">
        <a href="/" class="text-xl font-bold tracking-wider flex items-center gap-2">✨ EUKHLOU ZIKROULAH</a>
        <a href="/" class="px-5 py-2 rounded-full text-sm font-medium border bg-white hover:bg-gray-50">← Retour</a>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <section class="max-w-xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-center">Proposer une affiche</h2>
            <form id="upload-form" class="clean-card rounded-2xl p-8 space-y-4">
                <input type="text" id="dahira" required placeholder="Nom de la Dahira" class="w-full px-4 py-3 rounded-xl clean-input">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="date" required class="w-full px-4 py-3 rounded-xl clean-input">
                    <input type="time" id="time" required class="w-full px-4 py-3 rounded-xl clean-input">
                </div>
                <input type="text" id="location" required placeholder="Lieu" class="w-full px-4 py-3 rounded-xl clean-input">
                <input type="file" id="poster" accept="image/*" required class="w-full px-4 py-3 rounded-xl clean-input">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-[#404040] text-white rounded-xl">Soumettre l'affiche</button>
            </form>
            <div id="status-message" class="hidden text-center p-3 rounded-xl text-sm"></div>
        </section>
    </main>

    <script>
        const supabase = supabase.createClient(
            'https://fjyofnjskrzsscvnrjlh.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqeW9mbmpza3J6c3Njdm5yamxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODk4NjQsImV4cCI6MjA5OTg2NTg2NH0.H8tDYlDPaPNxBGKCrwy6e6fBl15p6HoGika--p7mNRo'
        );

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-message');
            btn.disabled = true;
            btn.textContent = "Envoi en cours...";

            const file = document.getElementById('poster').files[0];
            const fileExt = file.name.split('.').pop();
            const fileName = `${Date.now()}.${fileExt}`;

            const { error: uploadError } = await supabase.storage.from('posters').upload(fileName, file);
            if (uploadError) {
                msg.textContent = "Erreur image: " + uploadError.message;
                msg.classList.remove('hidden');
                btn.disabled = false; return;
            }

            const { error } = await supabase.from('zikrs').insert({
                dahira_name: document.getElementById('dahira').value,
                zikr_date: document.getElementById('date').value,
                zikr_time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                poster_url: fileName
            });

            if (error) {
                msg.textContent = "Erreur base: " + error.message;
                msg.className = "text-center p-3 bg-red-100 text-red-700 rounded-xl";
            } else {
                msg.textContent = "✨ Affiche envoyée avec succès !";
                msg.className = "text-center p-3 bg-green-100 text-green-600 rounded-xl";
                document.getElementById('upload-form').reset();
            }
            msg.classList.remove('hidden');
            btn.disabled = false; btn.textContent = "Soumettre l'affiche";
        };
    </script>
</body>
</html>
