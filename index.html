<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eukhlou Zikroulah - Soumettre un Zikr</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f4f7f6;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .form-container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 450px;
    }
    h2 {
      margin-top: 0;
      color: #2c3e50;
      text-align: center;
    }
    .form-group {
      margin-bottom: 15px;
    }
    label {
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
      color: #34495e;
    }
    input[type="text"], input[type="date"], input[type="time"], input[type="file"] {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #2ecc71;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background-color 0.3s;
    }
    button:hover {
      background-color: #27ae60;
    }
    #message {
      margin-top: 15px;
      padding: 10px;
      border-radius: 6px;
      display: none;
      text-align: center;
      font-weight: bold;
    }
    .success { background-color: #d4edda; color: #155724; }
    .error { background-color: #f8d7da; color: #721c24; }
  </style>
</head>
<body>

<div class="form-container">
  <!-- Bouton vers les affiches -->
    <div style="display: flex; justify-content: flex-end; margin-bottom: 20px;">
      <a href="/affiches.html" style="text-decoration: none; font-size: 14px; font-weight: 600; color: #2ecc71; border: 1px solid #2ecc71; padding: 8px 16px; border-radius: 20px; transition: all 0.3s ease; display: inline-flex; align-items: center; gap: 6px;">
        ✨ Voir les Affiches &rarr;
      </a>
    </div>
    <h2>Soumettre un Zikr</h2>
  <form id="zikrForm">
    <div class="form-group">
      <label for="dahira">Nom du Dahira *</label>
      <input type="text" id="dahira" name="dahira" required placeholder="Ex: Dahira Eukhlou Zikroulah">
    </div>

    <div class="form-group">
      <label for="date">Date de l'événement *</label>
      <input type="date" id="date" name="date" required>
    </div>

    <div class="form-group">
      <label for="time">Heure *</label>
      <input type="time" id="time" name="time" required>
    </div>

    <div class="form-group">
      <label for="location">Lieu *</label>
      <input type="text" id="location" name="location" required placeholder="Ex: Grand Dakar, près de la Mosquée">
    </div>

    <div class="form-group">
      <label for="maps">Lien Google Maps (Optionnel)</label>
      <input type="text" id="maps" name="maps" placeholder="https://maps.google.com/...">
    </div>

    <div class="form-group">
      <label for="poster">Affiche de l'événement (Max 1 Mo) *</label>
      <input type="file" id="poster" name="poster" accept="image/*" required>
    </div>

    <button type="submit" id="submitBtn">Envoyer la demande</button>
  </form>

  <div id="message"></div>
</div>

<script>
  const API_URL = "https://eukhlou-zikroulah.kalu-papis.workers.dev/api/zikr/submit";
  const form = document.getElementById("zikrForm");
  const messageDiv = document.getElementById("message");
  const submitBtn = document.getElementById("submitBtn");

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    
    // Verrouiller le bouton pendant l'envoi
    submitBtn.disabled = true;
    submitBtn.innerText = "Envoi en cours...";
    messageDiv.style.display = "none";

    // Préparation des données du formulaire (gère le fichier image automatiquement !)
    const formData = new FormData(form);

    try {
      const response = await fetch(API_URL, {
        method: "POST",
        body: formData // Pas de Header 'Content-Type' ! Le navigateur le définit automatiquement avec le bon "boundary" pour les fichiers
      });

      const result = await response.json();

      if (response.ok) {
        showMessage("Votre événement a été soumis avec succès et est en attente de modération !", "success");
        form.reset();
      } else {
        showMessage(result.error || "Une erreur est survenue lors de la soumission.", "error");
      }
    } catch (error) {
      console.error("Erreur de connexion :", error);
      showMessage("Impossible de contacter le serveur. Vérifiez votre connexion.", "error");
    } finally {
      // Déverrouiller le bouton
      submitBtn.disabled = false;
      submitBtn.innerText = "Envoyer la demande";
    }
  });

  function showMessage(text, type) {
    messageDiv.innerText = text;
    messageDiv.className = `message ${type}`;
    messageDiv.style.display = "block";
  }
</script>

</body>
</html>
