<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiches des Événements - Eukhlou Zikroulah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #F5F5F5 0%, #F0FFFE 100%); font-family: 'Inter', sans-serif; }
        .clean-card { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
        .clean-input { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.12); color: #1A1A1A; }
    </style>
</head>
<body class="text-[#1A1A1A] min-h-screen pb-12">
    <header class="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center border-b border-black/5 mb-10">
        <a href="/" class="text-xl font-bold tracking-wider flex items-center gap-2 text-[#2A2A2A]">✨ EUKHLOU ZIKROULAH</a>
    </header>
    <main class="max-w-6xl mx-auto px-4">
        <section class="max-w-xl mx-auto space-y-6">
            <h2 class="text-2xl font-bold text-center">Proposer une affiche</h2>
            <form id="upload-form" class="clean-card rounded-2xl p-8 space-y-4">
                <input type="text" name="dahira" required placeholder="Nom de la Dahira" class="w-full px-4 py-3 rounded-xl clean-input text-sm">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" name="date" required class="w-full px-4 py-3 rounded-xl clean-input text-sm">
                    <input type="time" name="time" required class="w-full px-4 py-3 rounded-xl clean-input text-sm">
                </div>
                <input type="text" name="location" required placeholder="Lieu" class="w-full px-4 py-3 rounded-xl clean-input text-sm">
                <input type="file" name="poster" accept="image/*" required class="w-full px-4 py-3 rounded-xl clean-input text-sm">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-[#404040] text-white font-semibold rounded-xl">Soumettre</button>
            </form>
            <div id="status-message" class="hidden text-center p-3 rounded-xl text-sm mt-4"></div>
        </section>
    </main>
    <script>
        const API_URL = "https://eukhlou-zikroulah.kalu-papis.workers.dev";
        const form = document.getElementById('upload-form');
        const msg = document.getElementById('status-message');
        form.onsubmit = async (e) => {
            e.preventDefault();
            msg.classList.add('hidden');
            const btn = document.getElementById('submit-btn');
            btn.disabled = true;
            btn.textContent = "Envoi...";
            const formData = new FormData(form);
            try {
                const res = await fetch(`${API_URL}/api/zikr/submit`, { method: 'POST', body: formData });
                const data = await res.json();
                if (res.ok) {
                    msg.textContent = "Succès !";
                    msg.className = "text-center p-3 bg-green-100 text-green-700 rounded-xl mt-4";
                    form.reset();
                } else { throw new Error(data.error || "Erreur serveur"); }
            } catch (err) {
                msg.textContent = "Erreur : " + err.message;
                msg.className = "text-center p-3 bg-red-100 text-red-700 rounded-xl mt-4";
            } finally { btn.disabled = false; btn.textContent = "Soumettre"; msg.classList.remove('hidden'); }
        };
    </script>
</body>
</html>
