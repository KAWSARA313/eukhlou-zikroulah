<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Affiches des Événements - Eukhlou Zikroulah</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: linear-gradient(135deg, #F5F5F5 0%, #F0FFFE 100%); font-family: sans-serif; }
        .clean-card { background: #FFFFFF; border: 1px solid rgba(0, 0, 0, 0.08); box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04); }
    </style>
</head>
<body class="text-[#1A1A1A] min-h-screen pb-12">
    <header class="max-w-6xl mx-auto px-4 py-6 border-b border-black/5 mb-10">
        <a href="/" class="text-xl font-bold tracking-wider">✨ EUKHLOU ZIKROULAH</a>
    </header>

    <main class="max-w-6xl mx-auto px-4 space-y-12">
        <section class="max-w-xl mx-auto">
            <h2 class="text-2xl font-bold text-center mb-6">Proposer une affiche</h2>
            <form id="upload-form" class="clean-card rounded-2xl p-8 space-y-4">
                <input type="text" id="dahira" required placeholder="Nom de la Dahira" class="w-full px-4 py-3 rounded-xl border">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="date" required class="w-full px-4 py-3 rounded-xl border">
                    <input type="time" id="time" required class="w-full px-4 py-3 rounded-xl border">
                </div>
                <input type="text" id="location" required placeholder="Lieu" class="w-full px-4 py-3 rounded-xl border">
                <input type="file" id="poster" accept="image/*" required class="w-full px-4 py-3 rounded-xl border">
                <button type="submit" id="submit-btn" class="w-full py-3 bg-[#404040] text-white rounded-xl">Soumettre</button>
            </form>
            <div id="status-message" class="hidden mt-4 p-4 rounded-xl text-center text-sm"></div>
        </section>

        <section>
            <h2 class="text-2xl font-bold mb-6">Événements publiés</h2>
            <div id="events-list" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
        </section>
    </main>

    <script>
        const supabase = supabase.createClient(
            'https://fjyofnjskrzsscvnrjlh.supabase.co', 
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqeW9mbmpza3J6c3Njdm5yamxoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQyODk4NjQsImV4cCI6MjA5OTg2NTg2NH0.H8tDYlDPaPNxBGKCrwy6e6fBl15p6HoGika--p7mNRo'
        );

        // Chargement des événements
        async function loadEvents() {
            const { data } = await supabase.from('zikrs').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('events-list').innerHTML = data.map(ev => `
                    <div class="clean-card p-4 rounded-2xl">
                        <h3 class="font-bold">${ev.dahira_name}</h3>
                        <p class="text-sm text-gray-500">${ev.zikr_date} à ${ev.zikr_time}</p>
                        <p class="text-xs mt-2 text-gray-400">📍 ${ev.location}</p>
                    </div>
                `).join('');
            }
        }

        document.getElementById('upload-form').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const msg = document.getElementById('status-message');
            btn.disabled = true;

            const file = document.getElementById('poster').files[0];
            const fileName = `${Date.now()}_${file.name}`;
            await supabase.storage.from('posters').upload(fileName, file);

            const { error } = await supabase.from('zikrs').insert({
                dahira_name: document.getElementById('dahira').value,
                zikr_date: document.getElementById('date').value,
                zikr_time: document.getElementById('time').value,
                location: document.getElementById('location').value,
                poster_url: fileName
            });

            if (error) {
                msg.textContent = "Erreur: " + error.message;
                msg.className = "mt-4 p-4 bg-red-100 text-red-700 rounded-xl";
            } else {
                msg.textContent = "✨ Affiche envoyée !";
                msg.className = "mt-4 p-4 bg-green-100 text-green-700 rounded-xl";
                document.getElementById('upload-form').reset();
                loadEvents();
            }
            msg.classList.remove('hidden');
            btn.disabled = false;
        };
        
        loadEvents();
    </script>
</body>
</html>
